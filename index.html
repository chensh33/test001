<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HealthCare CRM</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f3f2f1; color: #201f1e; height: 100vh; overflow: hidden; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #c8c6c4; border-radius: 3px; }
  input, select, textarea, button { font-family: inherit; }
  button:focus { outline: 2px solid #0078d4; outline-offset: 1px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="data.js"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="Members.jsx"></script>
<script type="text/babel" src="Providers.jsx"></script>
<script type="text/babel" src="CallCenter.jsx"></script>
<script type="text/babel" src="Cases.jsx"></script>
<script type="text/babel" src="Workflows.jsx"></script>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primaryColor": "#038387",
  "navDark": true,
  "compactMode": false,
  "orgName": "AZ HealthPlan CRM"
}/*EDITMODE-END*/;

const App = () => {
  const [tweaks, setTweaks] = React.useState(() => {
    try { return { ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('hcrm_tweaks') || '{}') }; } catch { return TWEAK_DEFAULTS; }
  });
  const [page, setPage] = React.useState(() => localStorage.getItem('hcrm_page') || 'dashboard');
  const [navCollapsed, setNavCollapsed] = React.useState(false);
  const [pendingMember, setPendingMember] = React.useState(null);
  const [showTweaks, setShowTweaks] = React.useState(false);

  React.useEffect(() => { localStorage.setItem('hcrm_page', page); }, [page]);
  React.useEffect(() => { localStorage.setItem('hcrm_tweaks', JSON.stringify(tweaks)); }, [tweaks]);

  // Tweaks panel
  React.useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const setTweak = (k, v) => {
    const updated = { ...tweaks, [k]: v };
    setTweaks(updated);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: updated }, '*');
  };

  const primary = tweaks.primaryColor;
  const navBg = tweaks.navDark ? '#1b1a19' : '#005a9e';

  const navItems = [
    { key: 'dashboard', label: 'Dashboard', icon: '⊞' },
    { key: 'members', label: 'Members', icon: '👥' },
    { key: 'providers', label: 'Providers', icon: '🏥' },
    { key: 'groups', label: 'Groups', icon: '🏢' },
    { key: 'callcenter', label: 'Call Center', icon: '📞' },
    { key: 'cases', label: 'Cases', icon: '📋' },
    { key: 'workflows', label: 'Workflows', icon: '🔄' },
  ];

  const navSections = [
    { title: 'MY WORK', items: ['dashboard'] },
    { title: 'Records', items: ['members', 'providers', 'groups'] },
    { title: 'Operations', items: ['callcenter', 'cases', 'workflows'] },
  ];

  const handleCreateCase = (member) => {
    setPendingMember(member);
    setPage('cases');
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', overflow: 'hidden' }}>
      {/* Top Bar */}
      <div style={{ background: navBg, color: '#fff', display: 'flex', alignItems: 'center', height: 48, paddingLeft: 12, paddingRight: 16, gap: 12, flexShrink: 0, zIndex: 10 }}>
        <button onClick={() => setNavCollapsed(n => !n)} style={{ background: 'none', border: 'none', color: '#fff', cursor: 'pointer', fontSize: 18, padding: '4px 8px', opacity: 0.8 }}>☰</button>
        <div style={{ width: 1, height: 24, background: 'rgba(255,255,255,0.2)' }} />
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <div style={{ width: 20, height: 20, background: primary, borderRadius: 3, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, color: '#fff', fontWeight: 700 }}>H</div>
          <span style={{ fontWeight: 700, fontSize: 15, letterSpacing: '-0.01em' }}>{tweaks.orgName}</span>
        </div>
        <div style={{ flex: 1 }} />
        {/* Search */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, background: 'rgba(255,255,255,0.12)', borderRadius: 2, padding: '4px 12px', width: 220 }}>
          <span style={{ opacity: 0.6, fontSize: 13 }}>🔍</span>
          <input placeholder="Search CRM..." style={{ background: 'none', border: 'none', color: '#fff', fontSize: 13, outline: 'none', width: '100%' }} />
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {['🔔','⚙️','?'].map((ic, i) => (
            <button key={i} style={{ background: 'none', border: 'none', color: '#fff', cursor: 'pointer', fontSize: 16, padding: '4px 8px', opacity: 0.8, borderRadius: 2 }}>{ic}</button>
          ))}
          <div style={{ width: 32, height: 32, borderRadius: '50%', background: primary, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, fontSize: 13, cursor: 'pointer' }}>CU</div>
        </div>
      </div>

      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
        {/* Left Nav */}
        <div style={{ width: navCollapsed ? 48 : 200, background: navBg, color: '#c8c6c4', display: 'flex', flexDirection: 'column', transition: 'width 0.2s', overflow: 'hidden', flexShrink: 0 }}>
          {navSections.map(section => (
            <div key={section.title}>
              {!navCollapsed && (
                <div style={{ padding: '16px 14px 4px', fontSize: 10, fontWeight: 700, color: 'rgba(200,198,196,0.5)', textTransform: 'uppercase', letterSpacing: '0.08em' }}>
                  {section.title}
                </div>
              )}
              {section.items.map(key => {
                const item = navItems.find(n => n.key === key);
                const active = page === key;
                return (
                  <button key={key} onClick={() => setPage(key)} title={navCollapsed ? item.label : undefined}
                    style={{
                      display: 'flex', alignItems: 'center', gap: 10,
                      padding: navCollapsed ? '10px 0' : '9px 14px',
                      justifyContent: navCollapsed ? 'center' : 'flex-start',
                      background: active ? 'rgba(0,120,212,0.25)' : 'none',
                      borderLeft: active ? `3px solid ${primary}` : '3px solid transparent',
                      border: 'none', color: active ? '#fff' : '#c8c6c4',
                      cursor: 'pointer', width: '100%', fontSize: 13, fontWeight: active ? 600 : 400,
                      transition: 'background 0.1s',
                    }}>
                    <span style={{ fontSize: 16, flexShrink: 0 }}>{item.icon}</span>
                    {!navCollapsed && <span style={{ whiteSpace: 'nowrap' }}>{item.label}</span>}
                  </button>
                );
              })}
            </div>
          ))}
          <div style={{ flex: 1 }} />
          {!navCollapsed && (
            <div style={{ padding: '12px 14px', borderTop: '1px solid rgba(255,255,255,0.08)', fontSize: 11, color: 'rgba(200,198,196,0.4)' }}>
              v2.5.1 · April 2025
            </div>
          )}
        </div>

        {/* Main Content */}
        <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
          {page === 'dashboard' && <Dashboard data={DATA} onNavigate={setPage} />}
          {page === 'members' && <MembersModule data={DATA} onCreateCase={handleCreateCase} />}
          {page === 'providers' && <ProvidersModule data={DATA} />}
          {page === 'groups' && <GroupsModule data={DATA} />}
          {page === 'callcenter' && <CallCenter data={DATA} onCreateCase={handleCreateCase} />}
          {page === 'cases' && <CasesModule data={DATA} initialMember={pendingMember} onClearInitialMember={() => setPendingMember(null)} />}
          {page === 'workflows' && <WorkflowsModule data={DATA} />}
        </div>
      </div>

      {/* Tweaks Panel */}
      {showTweaks && (
        <div style={{ position: 'fixed', bottom: 20, right: 20, background: '#fff', border: '1px solid #e1dfdd', borderRadius: 6, padding: 20, width: 260, boxShadow: '0 8px 32px rgba(0,0,0,0.15)', zIndex: 9999 }}>
          <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 14, color: '#201f1e' }}>Tweaks</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div>
              <div style={{ fontSize: 11, fontWeight: 600, color: '#605e5c', marginBottom: 4 }}>Organization Name</div>
              <input value={tweaks.orgName} onChange={e => setTweak('orgName', e.target.value)}
                style={{ width: '100%', padding: '5px 8px', border: '1px solid #c8c6c4', borderRadius: 2, fontSize: 13 }} />
            </div>
            <div>
              <div style={{ fontSize: 11, fontWeight: 600, color: '#605e5c', marginBottom: 4 }}>Primary Color</div>
              <div style={{ display: 'flex', gap: 6 }}>
                {['#0078d4','#107c10','#8764b8','#038387','#ca5010'].map(c => (
                  <div key={c} onClick={() => setTweak('primaryColor', c)} style={{ width: 24, height: 24, borderRadius: '50%', background: c, cursor: 'pointer', border: tweaks.primaryColor === c ? '3px solid #201f1e' : '3px solid transparent' }} />
                ))}
              </div>
            </div>
            <div>
              <div style={{ fontSize: 11, fontWeight: 600, color: '#605e5c', marginBottom: 4 }}>Navigation Theme</div>
              <div style={{ display: 'flex', gap: 6 }}>
                {[['Dark','dark'],['Blue','blue']].map(([l, v]) => (
                  <button key={v} onClick={() => setTweak('navDark', v === 'dark')}
                    style={{ flex: 1, padding: '5px', fontSize: 12, cursor: 'pointer', borderRadius: 2, border: '1px solid #c8c6c4', background: (v === 'dark') === tweaks.navDark ? '#0078d4' : '#fff', color: (v === 'dark') === tweaks.navDark ? '#fff' : '#201f1e' }}>
                    {l}
                  </button>
                ))}
              </div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: '#605e5c' }}>Compact Mode</div>
              <div onClick={() => setTweak('compactMode', !tweaks.compactMode)} style={{ width: 36, height: 20, borderRadius: 10, background: tweaks.compactMode ? '#0078d4' : '#c8c6c4', cursor: 'pointer', position: 'relative', transition: 'background 0.2s' }}>
                <div style={{ position: 'absolute', top: 3, left: tweaks.compactMode ? 18 : 3, width: 14, height: 14, borderRadius: '50%', background: '#fff', transition: 'left 0.2s' }} />
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
